site_name: foga
site_url: https://fedluc.github.io/foga/
repo_url: https://github.com/fedluc/foga
repo_name: fedluc/foga

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: amber

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration:
      - Overview: configuration/index.md
      - Backends: configuration/backends.md
      - Profiles And Hooks: configuration/profiles-and-hooks.md
  - CLI Reference: cli.md
  - Examples:
      - Overview: examples/index.md
      - qupled: examples/qupled.md
      - pybind11: examples/pybind11.md
  - Development: development.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
