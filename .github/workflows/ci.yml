name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync project dependencies
        run: uv sync --frozen --extra dev --extra docs

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run test suite
        run: uv run pytest

      - name: Build package
        run: uv run python -m build

      - name: Build docs
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Run pure Python tutorial example
        run: python run-example.py python-only

      - name: Run basic pybind11 tutorial example
        run: python run-example.py pybind11-hello

      - name: Run tested pybind11 tutorial example
        run: python run-example.py pybind11-tests

      - name: Run profiled pybind11 tutorial example
        run: python run-example.py pybind11-profiles

      - name: Validate real-world example configurations
        run: |
          uv run foga --config examples/qupled/foga.yml validate
          uv run foga --config examples/pybind11/foga.yml validate
