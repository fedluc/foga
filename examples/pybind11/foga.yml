project:
  name: pybind11

build:
  default: all
  cpp:
    backend: cmake
    source_dir: .
    build_dir: build-foga
    generator: Ninja
    configure_args:
      - -DCMAKE_BUILD_TYPE=Debug
      - -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - -DDOWNLOAD_CATCH=ON
      - -DDOWNLOAD_EIGEN=ON
      - -DPYBIND11_FINDPYTHON=NEW
      - -DPYBIND11_WERROR=ON
      - -DCMAKE_COLOR_DIAGNOSTICS=ON
    build_args:
      - "2"
    targets:
      - check
  python:
    backend: python-build

install:
  default_targets:
    - system
    - python-deps
    - project
  targets:
    system:
      backend: apt-get
      args:
        - -y
        - --no-install-recommends
      packages:
        - cmake
        - doxygen
        - ninja-build
        - python3-dev
      hooks:
        pre:
          - ["apt-get", "update"]
    python-deps:
      backend: pip
      args:
        - -r
        - tests/requirements.txt
      packages:
        - pip
        - build
    project:
      backend: pip
      path: .
    docs-env:
      backend: pip
      path: .
      args:
        - -r
        - docs/requirements.txt

test:
  default: python
  default_runners:
    - packaging
  runners:
    packaging:
      backend: pytest
      path: tests/extra_python_package
      args:
        - -v

docs:
  default_targets:
    - site-html
  targets:
    site-html:
      backend: sphinx
      source_dir: docs
      build_dir: docs/.build/html
      hooks:
        pre:
          - ["foga", "install", "--target", "docs-env"]

clean:
  paths:
    - build-foga
    - build-foga-debug
    - build-foga-release
    - build-foga-venv
    - build-foga-focused
    - dist
    - docs/.build

profiles:
  release:
    build:
      cpp:
        build_dir: build-foga-release
        configure_args:
          - -DCMAKE_BUILD_TYPE=Release
          - -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          - -DDOWNLOAD_CATCH=ON
          - -DDOWNLOAD_EIGEN=ON
          - -DPYBIND11_FINDPYTHON=NEW
          - -DPYBIND11_WERROR=ON
          - -DCMAKE_COLOR_DIAGNOSTICS=ON

  venv:
    build:
      cpp:
        build_dir: build-foga-venv
        configure_args:
          - -DCMAKE_BUILD_TYPE=Debug
          - -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          - -DDOWNLOAD_CATCH=ON
          - -DDOWNLOAD_EIGEN=ON
          - -DPYBIND11_FINDPYTHON=NEW
          - -DPYBIND11_WERROR=ON
          - -DCMAKE_COLOR_DIAGNOSTICS=ON
          - -DPYBIND11_CREATE_WITH_UV=python3

  debug:
    build:
      cpp:
        build_dir: build-foga-debug
        build_args:
          - "1"
        targets: []
        configure_args:
          - -DCMAKE_BUILD_TYPE=Debug
          - -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          - -DDOWNLOAD_CATCH=ON
          - -DDOWNLOAD_EIGEN=ON
          - -DPYBIND11_FINDPYTHON=NEW
          - -DPYBIND11_WERROR=ON
          - -DCMAKE_COLOR_DIAGNOSTICS=ON

  cpptest:
    build:
      cpp:
        targets:
          - cpptest

  pytest-target:
    build:
      cpp:
        targets:
          - pytest

  cmake-build-tests:
    build:
      cpp:
        targets:
          - test_cmake_build

  cross-module-rtti:
    build:
      cpp:
        targets:
          - test_cross_module_rtti

  focused-callbacks-pickling:
    build:
      cpp:
        build_dir: build-foga-focused
        configure_args:
          - -DCMAKE_BUILD_TYPE=Debug
          - -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          - -DDOWNLOAD_CATCH=ON
          - -DDOWNLOAD_EIGEN=ON
          - -DPYBIND11_FINDPYTHON=NEW
          - -DPYBIND11_WERROR=ON
          - -DCMAKE_COLOR_DIAGNOSTICS=ON
          - -DPYBIND11_TEST_OVERRIDE=test_callbacks;test_pickling
