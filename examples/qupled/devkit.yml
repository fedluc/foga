project:
  name: qupled

build:
  default: all
  native:
    backend: cmake
    source_dir: src/qupled/native/src
    build_dir: dist-native
    configure_args:
      - -DBUILD_NATIVE_TESTS=OFF
      - -DUSE_MPI=OFF
  python:
    backend: python-build
    env:
      USE_MPI: "OFF"
      BUILD_NATIVE_TESTS: "OFF"

test:
  default: all
  runners:
    unit:
      backend: pytest
      path: tests
      marker: unit
      args:
        - -v
    native-bindings:
      backend: pytest
      path: tests
      marker: native
      args:
        - -v
    integration:
      backend: pytest
      path: tests
      marker: integration
      args:
        - -v
      hooks:
        pre:
          - [
              "python3",
              "-c",
              "from pathlib import Path; import shutil; src = Path('examples/docs'); dst = Path('docs'); dst.mkdir(exist_ok=True); [shutil.copy2(path, dst / path.name) for path in src.glob('*.py')]",
            ]
        post:
          - [
              "python3",
              "-c",
              "from pathlib import Path; src = Path('examples/docs'); dst = Path('docs'); [(dst / path.name).unlink() for path in src.glob('*.py') if (dst / path.name).exists()]",
            ]
    native-cpp:
      backend: ctest
      source_dir: src/qupled/native/src
      build_dir: dist-native-tests
      configure_args:
        - -DBUILD_NATIVE_TESTS=ON
        - -DUSE_MPI=OFF
      target: native_tests
      args:
        - -V

profiles:
  mpi:
    build:
      native:
        configure_args:
          - -DBUILD_NATIVE_TESTS=OFF
          - -DUSE_MPI=ON
      python:
        env:
          USE_MPI: "ON"
          BUILD_NATIVE_TESTS: "OFF"
    test:
      runners:
        native-cpp:
          configure_args:
            - -DBUILD_NATIVE_TESTS=ON
            - -DUSE_MPI=ON
  macos-homebrew:
    build:
      native:
        env:
          OpenMP_ROOT: /opt/homebrew/opt/libomp
      python:
        env:
          OpenMP_ROOT: /opt/homebrew/opt/libomp
    test:
      runners:
        native-cpp:
          env:
            OpenMP_ROOT: /opt/homebrew/opt/libomp
