project:
  name: qupled

build:
  default: all
  cpp:
    backend: cmake
    source_dir: src/qupled/cpp/src
    build_dir: dist-cpp
    configure_args:
      - -DBUILD_CPP_TESTS=OFF
      - -DUSE_MPI=OFF
  python:
    backend: python-build
    env:
      USE_MPI: "OFF"
      BUILD_CPP_TESTS: "OFF"

test:
  default: all
  runners:
    unit:
      backend: pytest
      path: tests
      marker: unit
      args:
        - -v
    cpp-bindings:
      backend: pytest
      path: tests
      marker: cpp
      args:
        - -v
    integration:
      backend: pytest
      path: tests
      marker: integration
      args:
        - -v
      hooks:
        pre:
          - [
              "python3",
              "-c",
              "from pathlib import Path; import shutil; src = Path('examples/docs'); dst = Path('docs'); dst.mkdir(exist_ok=True); [shutil.copy2(path, dst / path.name) for path in src.glob('*.py')]",
            ]
        post:
          - [
              "python3",
              "-c",
              "from pathlib import Path; src = Path('examples/docs'); dst = Path('docs'); [(dst / path.name).unlink() for path in src.glob('*.py') if (dst / path.name).exists()]",
            ]
    cpp-tests:
      backend: ctest
      source_dir: src/qupled/cpp/src
      build_dir: dist-cpp-tests
      configure_args:
        - -DBUILD_CPP_TESTS=ON
        - -DUSE_MPI=OFF
      target: cpp_tests
      args:
        - -V

format:
  default: all
  targets:
    python-style:
      backend: ruff-format
      paths:
        - src
        - tests
    cpp-style:
      backend: clang-format
      paths:
        - src/qupled/cpp/src

lint:
  default: all
  targets:
    python-style:
      backend: ruff-check
      paths:
        - src
        - tests
    python-static:
      backend: pylint
      paths:
        - src
    cpp-style:
      backend: clang-tidy
      args:
        - -p
        - dist-cpp
      paths:
        - src/qupled/cpp/src

install:
  targets:
    editable:
      backend: pip
      path: .
      editable: true
    system:
      backend: apt-get
      launcher:
        - sudo
      args:
        - -y
      packages:
        - cmake
        - clang

profiles:
  mpi:
    build:
      cpp:
        configure_args:
          - -DBUILD_CPP_TESTS=OFF
          - -DUSE_MPI=ON
      python:
        env:
          USE_MPI: "ON"
          BUILD_CPP_TESTS: "OFF"
    test:
      runners:
        cpp-tests:
          configure_args:
            - -DBUILD_CPP_TESTS=ON
            - -DUSE_MPI=ON
  macos-homebrew:
    build:
      cpp:
        env:
          OpenMP_ROOT: /opt/homebrew/opt/libomp
      python:
        env:
          OpenMP_ROOT: /opt/homebrew/opt/libomp
    test:
      runners:
        cpp-tests:
          env:
            OpenMP_ROOT: /opt/homebrew/opt/libomp

deploy:
  targets:
    pypi:
      backend: twine
      artifacts:
        - fixtures/artifacts/demo-artifact.txt

clean:
  paths:
    - dist-cpp
    - dist-cpp-tests
